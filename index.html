<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudentHub — Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════ */
:root {
  --bg:        #0a0c10;
  --surface:   #111318;
  --surface2:  #181b22;
  --border:    #232730;
  --border2:   #2e3340;
  --text:      #e8eaf0;
  --muted:     #6b7280;
  --accent:    #4f8ef7;
  --accent2:   #7c6af5;
  --success:   #22c55e;
  --danger:    #ef4444;
  --warn:      #f59e0b;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.45);
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
.layout { display:flex; min-height:100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar-brand {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.brand-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -.3px;
}
.brand-name span { color: var(--accent); }

.sidebar-nav { padding: 16px 12px; flex:1; }
.nav-label {
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 12px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s, color .15s;
  font-size: .9rem;
  color: var(--muted);
  margin-bottom: 2px;
  user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(79,142,247,.12); color: var(--accent); }
.nav-icon { font-size: 1rem; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-size: .75rem;
  color: var(--muted);
}

/* ── Main ── */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* ── Topbar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
}
.topbar-actions { display:flex; gap:10px; align-items:center; }

/* ── Content ── */
.content { padding: 28px 32px; flex:1; }

/* ═══════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--border2); }
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.stat-icon.blue   { background: rgba(79,142,247,.15); }
.stat-icon.green  { background: rgba(34,197,94,.15); }
.stat-icon.orange { background: rgba(245,158,11,.15); }
.stat-info { min-width:0; }
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: .8rem; color: var(--muted); }

/* ═══════════════════════════════════════════════════
   TABLE SECTION
═══════════════════════════════════════════════════ */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.table-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.table-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 320px;
}
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .9rem;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: .875rem;
  padding: 9px 12px 9px 36px;
  outline: none;
  transition: border-color .2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); }

/* table */
.table-wrap { overflow-x: auto; }
table { width:100%; border-collapse:collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  text-align: left;
  padding: 12px 16px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
td {
  padding: 13px 16px;
  font-size: .875rem;
  vertical-align: middle;
}
.td-id {
  font-family: 'Syne', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .5px;
}
.td-name { font-weight: 500; }
.td-email { color: var(--muted); font-size:.83rem; }
.td-course { color: var(--text); }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .3px;
}
.badge-active   { background: rgba(34,197,94,.15);  color: #22c55e; }
.badge-inactive { background: rgba(107,114,128,.15); color: var(--muted); }
.badge-grade    { background: rgba(79,142,247,.1);   color: var(--accent); }

.actions { display:flex; gap:6px; }

/* ── empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: .9rem; }

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: .875rem;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  outline: none;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { opacity: .88; }
.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--surface2); }
.btn-icon {
  padding: 7px 9px;
  border-radius: 7px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  font-size: .9rem;
  display: inline-flex;
  align-items: center;
}
.btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.btn-icon.danger:hover { background: rgba(239,68,68,.1); color: var(--danger); border-color: var(--danger); }
.btn-icon.edit:hover   { background: rgba(79,142,247,.1); color: var(--accent); border-color: var(--accent); }
.btn-sm { padding: 6px 13px; font-size: .82rem; }

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset:0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.04);
  transform: translateY(20px) scale(.97);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-backdrop.open .modal { transform: translateY(0) scale(1); }
.modal-head {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
}
.modal-body { padding: 22px 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ── Form ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column: 1/-1; }
label {
  font-size: .8rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: .2px;
}
.form-control {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: .875rem;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s;
  width: 100%;
}
.form-control::placeholder { color: var(--muted); }
.form-control:focus { border-color: var(--accent); }
.form-control.error { border-color: var(--danger); }
select.form-control option { background: var(--surface2); }
.field-error { font-size:.75rem; color: var(--danger); }

/* ═══════════════════════════════════════════════════
   CONFIRM MODAL
═══════════════════════════════════════════════════ */
.confirm-icon {
  width: 52px; height: 52px;
  background: rgba(239,68,68,.12);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin: 0 auto 14px;
}
.confirm-body { text-align:center; padding: 24px; }
.confirm-title { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:700; margin-bottom:8px; }
.confirm-sub { font-size:.88rem; color: var(--muted); }
.btn-danger { background: var(--danger); color:#fff; }
.btn-danger:hover { opacity:.85; }

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 13px 18px;
  font-size: .875rem;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  animation: toastIn .3s cubic-bezier(.34,1.56,.64,1);
  transition: opacity .3s;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error   { border-left: 3px solid var(--danger); }
.toast.info    { border-left: 3px solid var(--accent); }
@keyframes toastIn {
  from { opacity:0; transform: translateX(40px); }
  to   { opacity:1; transform: translateX(0); }
}

/* ═══════════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════════ */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row td {
  text-align: center;
  padding: 48px;
}

/* ═══════════════════════════════════════════════════
   VIEW DETAIL PANEL
═══════════════════════════════════════════════════ */
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.detail-item label { font-size:.75rem; color:var(--muted); margin-bottom:4px; display:block; }
.detail-item .val  { font-size:.9rem; font-weight:500; }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
@media (max-width:900px) {
  .sidebar { width:200px; }
  .content { padding:20px; }
}
@media (max-width:700px) {
  .layout { flex-direction:column; }
  .sidebar { width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto; }
  .sidebar-brand { padding:14px 18px; }
  .sidebar-nav { display:flex; flex-direction:row; padding:8px; white-space:nowrap; }
  .sidebar-footer { display:none; }
  .stats-grid { grid-template-columns:1fr; }
  .form-grid  { grid-template-columns:1fr; }
  .topbar { padding: 0 18px; }
  .content { padding:16px; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🎓</div>
        <div class="brand-name">Student<span>Hub</span></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="setView('students')">
        <span class="nav-icon">👥</span> Students
      </div>
      <div class="nav-item" onclick="showStats()">
        <span class="nav-icon">📊</span> Statistics
      </div>
    </nav>

    <div class="sidebar-footer">
      Backend: Spring Boot + H2<br/>
      REST API on <code>:8080</code>
    </div>
  </aside>

  <!-- ══ MAIN ═════════════════════════════════════════════ -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">Student Management</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openCreate()">
          ＋ Add Student
        </button>
      </div>
    </header>

    <!-- Content -->
    <main class="content">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">Total Students</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-active">—</div>
            <div class="stat-label">Active</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">⏸</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-inactive">—</div>
            <div class="stat-label">Inactive</div>
          </div>
        </div>
      </div>

      <!-- Table Section -->
      <div class="table-section">
        <div class="table-header">
          <div class="table-title">All Students</div>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" type="text" placeholder="Search by name, ID, email, course…"
                   id="search-input" oninput="handleSearch(this.value)"/>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Grade</th>
                <th>Status</th>
                <th>Enrolled</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="student-tbody">
              <tr class="loading-row">
                <td colspan="8"><span class="spinner"></span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ══ CREATE / EDIT MODAL ═══════════════════════════════ -->
<div class="modal-backdrop" id="form-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add Student</div>
      <button class="btn-icon" onclick="closeModal('form-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label for="f-first">First Name *</label>
          <input class="form-control" id="f-first" placeholder="Aanya"/>
          <span class="field-error" id="e-first"></span>
        </div>
        <div class="form-group">
          <label for="f-last">Last Name *</label>
          <input class="form-control" id="f-last" placeholder="Sharma"/>
          <span class="field-error" id="e-last"></span>
        </div>
        <div class="form-group full">
          <label for="f-email">Email Address *</label>
          <input class="form-control" id="f-email" type="email" placeholder="student@university.edu"/>
          <span class="field-error" id="e-email"></span>
        </div>
        <div class="form-group">
          <label for="f-phone">Phone</label>
          <input class="form-control" id="f-phone" placeholder="+91-9876543210"/>
        </div>
        <div class="form-group">
          <label for="f-course">Course *</label>
          <input class="form-control" id="f-course" placeholder="Computer Science"/>
          <span class="field-error" id="e-course"></span>
        </div>
        <div class="form-group">
          <label for="f-grade">Grade</label>
          <select class="form-control" id="f-grade">
            <option value="">— Select —</option>
            <option>A+</option><option>A</option><option>A-</option>
            <option>B+</option><option>B</option><option>B-</option>
            <option>C+</option><option>C</option><option>F</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-status">Status *</label>
          <select class="form-control" id="f-status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-enrolled">Enrolled Date</label>
          <input class="form-control" id="f-enrolled" type="date"/>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('form-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveStudent()">
        Save Student
      </button>
    </div>
  </div>
</div>

<!-- ══ VIEW MODAL ════════════════════════════════════════ -->
<div class="modal-backdrop" id="view-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Student Details</div>
      <button class="btn-icon" onclick="closeModal('view-modal')">✕</button>
    </div>
    <div class="modal-body" id="view-modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('view-modal')">Close</button>
      <button class="btn btn-primary" id="view-edit-btn">Edit Student</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM DELETE MODAL ══════════════════════════════ -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal" style="max-width:380px">
    <div class="confirm-body">
      <div class="confirm-icon">🗑️</div>
      <div class="confirm-title">Delete Student?</div>
      <div class="confirm-sub" id="confirm-sub">This action cannot be undone.</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══════════════════════════════════════════════ -->
<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG  —  change BASE_URL to your server
═══════════════════════════════════════════════ */
const BASE_URL = 'http://localhost:8080/api/students';

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let editingId   = null;   // null = create, string = update
let searchTimer = null;
let students    = [];     // local cache

/* ═══════════════════════════════════════════════
   API HELPERS
═══════════════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const res = await fetch(BASE_URL + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
  return json;
}

/* ═══════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════ */
async function loadStudents(q = '') {
  setTbody(`<tr class="loading-row"><td colspan="8"><span class="spinner"></span></td></tr>`);
  try {
    const data = await apiFetch(q ? `?q=${encodeURIComponent(q)}` : '');
    students = data;
    renderTable(students);
  } catch (e) {
    setTbody(`<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--danger)">
      ⚠️ Could not reach server. Make sure Spring Boot is running on port 8080.
    </td></tr>`);
  }
}

async function loadStats() {
  try {
    const s = await apiFetch('/stats');
    document.getElementById('stat-total').textContent    = s.total    ?? '—';
    document.getElementById('stat-active').textContent   = s.active   ?? '—';
    document.getElementById('stat-inactive').textContent = s.inactive ?? '—';
  } catch { /* silent */ }
}

/* ═══════════════════════════════════════════════
   RENDER TABLE
═══════════════════════════════════════════════ */
function renderTable(rows) {
  if (!rows.length) {
    setTbody(`<tr><td colspan="8">
      <div class="empty-state">
        <div class="icon">🎓</div>
        <p>No students found.</p>
      </div>
    </td></tr>`);
    return;
  }
  const html = rows.map(s => `
    <tr>
      <td><span class="td-id">${s.id}</span></td>
      <td class="td-name">${esc(s.firstName)} ${esc(s.lastName)}</td>
      <td class="td-email">${esc(s.email)}</td>
      <td class="td-course">${esc(s.course)}</td>
      <td>${s.grade ? `<span class="badge badge-grade">${esc(s.grade)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="badge badge-${s.status === 'Active' ? 'active' : 'inactive'}">${esc(s.status)}</span></td>
      <td style="color:var(--muted);font-size:.83rem">${fmtDate(s.enrolledAt)}</td>
      <td>
        <div class="actions">
          <button class="btn-icon" title="View"   onclick="viewStudent('${s.id}')">👁</button>
          <button class="btn-icon edit"   title="Edit"   onclick="openEdit('${s.id}')">✏️</button>
          <button class="btn-icon danger" title="Delete" onclick="confirmDelete('${s.id}','${esc(s.firstName)} ${esc(s.lastName)}')">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
  setTbody(html);
}

function setTbody(html) {
  document.getElementById('student-tbody').innerHTML = html;
}

/* ═══════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════ */
function handleSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadStudents(val), 300);
}

/* ═══════════════════════════════════════════════
   VIEW STUDENT
═══════════════════════════════════════════════ */
function viewStudent(id) {
  const s = students.find(x => x.id === id);
  if (!s) return;
  const fields = [
    ['Student ID',    s.id],
    ['Full Name',     `${s.firstName} ${s.lastName}`],
    ['Email',         s.email],
    ['Phone',         s.phone || '—'],
    ['Course',        s.course],
    ['Grade',         s.grade || '—'],
    ['Status',        s.status],
    ['Enrolled',      fmtDate(s.enrolledAt)],
  ];
  document.getElementById('view-modal-body').innerHTML = `
    <div class="detail-grid">
      ${fields.map(([l,v]) => `
        <div class="detail-item">
          <label>${l}</label>
          <div class="val">${esc(String(v))}</div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('view-edit-btn').onclick = () => {
    closeModal('view-modal');
    openEdit(id);
  };
  openModal('view-modal');
}

/* ═══════════════════════════════════════════════
   CREATE STUDENT
═══════════════════════════════════════════════ */
function openCreate() {
  editingId = null;
  clearForm();
  document.getElementById('modal-title').textContent = 'Add New Student';
  document.getElementById('save-btn').textContent = 'Save Student';
  openModal('form-modal');
}

/* ═══════════════════════════════════════════════
   EDIT STUDENT
═══════════════════════════════════════════════ */
function openEdit(id) {
  const s = students.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  clearForm();
  document.getElementById('f-first').value    = s.firstName  || '';
  document.getElementById('f-last').value     = s.lastName   || '';
  document.getElementById('f-email').value    = s.email      || '';
  document.getElementById('f-phone').value    = s.phone      || '';
  document.getElementById('f-course').value   = s.course     || '';
  document.getElementById('f-grade').value    = s.grade      || '';
  document.getElementById('f-status').value   = s.status     || 'Active';
  document.getElementById('f-enrolled').value = s.enrolledAt ? s.enrolledAt.split('T')[0] : '';
  document.getElementById('modal-title').textContent = `Edit — ${s.firstName} ${s.lastName}`;
  document.getElementById('save-btn').textContent = 'Update Student';
  openModal('form-modal');
}

/* ═══════════════════════════════════════════════
   SAVE (create or update)
═══════════════════════════════════════════════ */
async function saveStudent() {
  if (!validateForm()) return;

  const payload = {
    firstName:  document.getElementById('f-first').value.trim(),
    lastName:   document.getElementById('f-last').value.trim(),
    email:      document.getElementById('f-email').value.trim(),
    phone:      document.getElementById('f-phone').value.trim() || null,
    course:     document.getElementById('f-course').value.trim(),
    grade:      document.getElementById('f-grade').value || null,
    status:     document.getElementById('f-status').value,
    enrolledAt: document.getElementById('f-enrolled').value || null,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  try {
    if (editingId) {
      await apiFetch(`/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) });
      toast('Student updated successfully', 'success');
    } else {
      await apiFetch('', { method: 'POST', body: JSON.stringify(payload) });
      toast('Student created successfully', 'success');
    }
    closeModal('form-modal');
    loadStudents();
    loadStats();
  } catch (e) {
    toast(e.message || 'Failed to save student', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? 'Update Student' : 'Save Student';
  }
}

/* ═══════════════════════════════════════════════
   DELETE
═══════════════════════════════════════════════ */
function confirmDelete(id, name) {
  document.getElementById('confirm-sub').textContent =
    `Are you sure you want to delete "${name}" (${id})? This cannot be undone.`;
  document.getElementById('confirm-delete-btn').onclick = () => deleteStudent(id);
  openModal('confirm-modal');
}

async function deleteStudent(id) {
  const btn = document.getElementById('confirm-delete-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    await apiFetch(`/${id}`, { method: 'DELETE' });
    toast('Student deleted', 'info');
    closeModal('confirm-modal');
    loadStudents();
    loadStats();
  } catch (e) {
    toast(e.message || 'Delete failed', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

/* ═══════════════════════════════════════════════
   VALIDATION
═══════════════════════════════════════════════ */
function validateForm() {
  let valid = true;
  const check = (id, errId, msg, test) => {
    const el  = document.getElementById(id);
    const err = document.getElementById(errId);
    if (!test(el.value)) {
      el.classList.add('error');
      err.textContent = msg;
      valid = false;
    } else {
      el.classList.remove('error');
      err.textContent = '';
    }
  };
  check('f-first',  'e-first',  'First name is required.',  v => v.trim());
  check('f-last',   'e-last',   'Last name is required.',   v => v.trim());
  check('f-email',  'e-email',  'Valid email is required.', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()));
  check('f-course', 'e-course', 'Course is required.',      v => v.trim());
  return valid;
}

function clearForm() {
  ['f-first','f-last','f-email','f-phone','f-course','f-grade','f-status','f-enrolled']
    .forEach(id => document.getElementById(id).value = '');
  ['f-first','f-last','f-email','f-course']
    .forEach(id => document.getElementById(id).classList.remove('error'));
  ['e-first','e-last','e-email','e-course']
    .forEach(id => document.getElementById(id).textContent = '');
  document.getElementById('f-status').value = 'Active';
}

/* ═══════════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════════ */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) backdrop.classList.remove('open');
  });
});

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
const TOAST_ICONS = { success: '✅', error: '❌', info: 'ℹ️' };
function toast(msg, type = 'info', duration = 3500) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${TOAST_ICONS[type]}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, duration);
}

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-IN', { year:'numeric', month:'short', day:'2-digit' }); }
  catch { return d; }
}
function setView(v) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');
}
function showStats() {
  setView('stats');
  toast('Stats panel — see the stat cards above.', 'info');
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
loadStudents();
loadStats();
</script>
</body>
</html>
